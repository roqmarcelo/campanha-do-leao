name: Atualiza classificação

on:
  schedule:
    # Janelas típicas de rodada (BRT = UTC-3): Qua/Qui/Sáb/Dom, 13h–23h BRT.
    - cron: '*/30 16-23 * * 3,4,6,0'
    - cron: '0-30/30 0-2 * * 4,5,0,1'
    # Varredura diária às 7h BRT (10h UTC).
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Buscar classificação
        run: node scripts/update-standings.mjs
      - name: Commit se mudou
        run: |
          git config user.name "leao-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/standings.json
          if git diff --staged --quiet; then
            echo "Sem mudanças para commitar."
          else
            git commit -m "chore: atualiza classificação $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
